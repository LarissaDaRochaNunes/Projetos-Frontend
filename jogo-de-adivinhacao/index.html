<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="styles.css">
    <title>Jogo de adivinhação</title>

  </head>

  <body>
    <h1>Jogo de adivinhação</h1>

    <p>Selecionamos um número aleatório entre 1 e 100. Veja se consegue adivinhar em 10 tentativas ou menos. Diremos se o seu palpite foi muito alto ou muito baixo.</p>

    <div class="form">
      <label for="campoPalpite">Digite um palpite: </label>
      <input type="number" min="1" max="100" required id="campoPalpite" class="campoPalpite">
      <input type="submit" value="Enviar palpite" class="envioPalpite">
    </div>

    <div class="resultParas">
      <p class="palpites"></p>
      <p class="ultimoResultado"></p>
      <p class="baixoOuAlto"></p>
    </div>

    <script src="script.js" defer></script>
  </body>
</html>
